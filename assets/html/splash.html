<!DOCTYPE html>

<html class="light" lang="en"><head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ZAJIL | Splash Screen</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "surface-dim": "#d7dadc",
                "on-secondary-container": "#44677b",
                "surface-container": "#ebeef0",
                "on-tertiary": "#ffffff",
                "on-surface": "#181c1e",
                "surface-bright": "#f7fafc",
                "surface-container-low": "#f1f4f6",
                "secondary-container": "#c1e5fc",
                "primary-fixed": "#bee9ff",
                "background": "#f7fafc",
                "inverse-on-surface": "#eef1f3",
                "surface": "#f7fafc",
                "surface-container-high": "#e5e9eb",
                "on-error": "#ffffff",
                "error-container": "#ffdad6",
                "surface-container-lowest": "#ffffff",
                "error": "#ba1a1a",
                "tertiary": "#885219",
                "inverse-surface": "#2d3133",
                "surface-tint": "#0d6683",
                "secondary-fixed": "#c4e7ff",
                "on-primary-container": "#005974",
                "on-tertiary-fixed": "#2d1600",
                "tertiary-container": "#ffb775",
                "on-primary-fixed-variant": "#004d65",
                "tertiary-fixed-dim": "#ffb876",
                "primary": "#0d6683",
                "on-error-container": "#93000a",
                "secondary-fixed-dim": "#a8cbe2",
                "primary-fixed-dim": "#8ad0f1",
                "on-tertiary-fixed-variant": "#6b3b01",
                "on-secondary": "#ffffff",
                "inverse-primary": "#8ad0f1",
                "primary-container": "#89cff0",
                "secondary": "#406376",
                "outline-variant": "#bfc8cd",
                "on-secondary-fixed": "#001e2c",
                "surface-container-highest": "#e0e3e5",
                "on-secondary-fixed-variant": "#274b5e",
                "outline": "#70787d",
                "on-surface-variant": "#40484d",
                "tertiary-fixed": "#ffdcc0",
                "surface-variant": "#e0e3e5",
                "on-tertiary-container": "#79460c",
                "on-primary-fixed": "#001f2a",
                "on-background": "#181c1e",
                "on-primary": "#ffffff"
              },
              fontFamily: {
                "headline": ["Inter"],
                "body": ["Inter"],
                "label": ["Inter"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .pulse-dot {
            animation: subtle-pulse 1.5s infinite ease-in-out;
        }
        .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body overflow-hidden h-screen">
<!-- Splash Container -->
<main class="flex flex-col items-center justify-center h-full w-full relative">
    <!-- Background Tonal Depth Layers -->
    <div class="absolute inset-0 bg-surface-bright pointer-events-none overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[120px] rounded-full"></div>
    </div>
    <!-- Content Shell -->
    <div class="relative z-10 flex flex-col items-center gap-12 w-full max-w-lg">
        <!-- Logo Brand Anchor -->
        <div class="relative">
            <div class="w-24 h-24 md:w-32 md:h-32 flex items-center justify-center -mt-24">
                <img alt="ZAJIL logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ugdK31TD2siOVASUqclX1y3e5eMmVCnyC4uaZFgNMEAKk-mNh9zzP4gK_9u5oZZffGI0-ftMn6uKpU5nXv1vEqbIVALkYnt413LoZkw8IFZwLEN2XiJ0yHetpZWHf1ES3XwL5lMFBpOFT6MzeKmloWYmngZQpFpZsrre9N9GZbqiC5rMsUbNseqo2IE3YJi9vm1yeEC_-TkFEXZy4dkGg119el9W3TecAKlDAN0PfR-c7k4-JUnVY3-6tXHRUSR0UeaWLVi3nNZYQQ"/>
            </div>
        </div>
        <!-- Typography Cluster: Symmetrical Layout -->
        <div class="flex items-center w-full relative px-8 mt-16">
            <!-- Left Half -->
            <div class="flex-1 flex justify-center items-center">
                <h1 class="text-2xl md:text-3xl font-light tracking-[0.4em] text-primary font-headline uppercase">
                    ZAJIL
                </h1>
            </div>
            <!-- Vertical Separator Line -->
            <div class="h-8 w-[1px] bg-outline-variant absolute left-1/2 -translate-x-1/2"></div>
            <!-- Right Half -->
            <div class="flex-1 flex justify-center items-center">
                <h1 class="text-2xl md:text-3xl font-light text-primary font-headline" dir="rtl">
                    زاجـــــــــل
                </h1>
            </div>
        </div>
    </div>
    <!-- Loading Indicator (Bottom Anchor) -->
    <div class="absolute bottom-16 left-0 right-0 flex flex-col items-center gap-4">
        <div class="flex gap-2 items-center">
            <div class="pulse-dot w-1.5 h-1.5 rounded-full bg-primary/40"></div>
            <div class="pulse-dot w-1.5 h-1.5 rounded-full bg-primary/40"></div>
            <div class="pulse-dot w-1.5 h-1.5 rounded-full bg-primary/40"></div>
        </div>
    </div>
</main>
</body></html>
